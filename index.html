<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Jalü — Rainbow Body</title>
<style>
  @font-face { font-family: 'Noto Serif Tibetan'; src: url('./vendor/fonts/tibetan.woff2') format('woff2'); font-display: swap; }
  html, body { margin: 0; height: 100%; background: #04050a; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  #ui {
    position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%); z-index: 10;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; justify-content: center;
    color: #cdd3e0; font-size: 12px;
    background: rgba(10,12,20,0.5); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 8px 16px; max-width: 94vw; user-select: none; transition: opacity .5s;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }
  #ui .grp { display: flex; align-items: center; gap: 7px; }
  #ui .ttl { font-weight: 600; letter-spacing: .04em; color: #fff; }
  #ui select { background: #11131c; color: #cdd3e0; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 4px 6px; font-size: 12px; }
  #ui label { display: flex; align-items: center; gap: 6px; color: #aab1c2; white-space: nowrap; }
  #ui input[type=range] { width: 74px; }
  #ui .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  #ui .dot.live { background: #42e695; box-shadow: 0 0 8px #42e695; }
  #ui button { background: #1a1d2b; color: #cdd3e0; border: 1px solid rgba(255,255,255,.12); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  #ui button:hover { background: #222637; }
  #tag { position: fixed; left: 14px; bottom: 12px; z-index: 9; color: #4a5366; font-size: 11px; transition: opacity .5s; }
  #tag.hidden { opacity: 0; }
  #ui button#rec.on { background: #c0263a; color: #fff; border-color: #ff5a72; }
  /* recording indicator — a DOM overlay, so it never appears in the captured frame */
  #recdot { position: fixed; top: 14px; right: 16px; z-index: 12; color: #ff5a72; font-size: 12px;
            letter-spacing: .08em; font-weight: 600; transition: opacity .4s; animation: recpulse 1.4s ease-in-out infinite; }
  #recdot.hidden { opacity: 0; pointer-events: none; }
  @keyframes recpulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  /* mobile-only handle to bring the panel back when it has auto-hidden */
  #panelToggle { display: none; position: fixed; right: 14px; bottom: max(12px, env(safe-area-inset-bottom));
                 z-index: 11; width: 40px; height: 40px; border-radius: 50%; font-size: 16px;
                 background: rgba(10,12,20,0.55); backdrop-filter: blur(10px); color: #cdd3e0;
                 border: 1px solid rgba(255,255,255,0.12); cursor: pointer; }
  /* entry overlay */
  #enter { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
           background: radial-gradient(ellipse at center, rgba(10,14,26,0.82), rgba(2,3,7,0.96));
           text-align: center; transition: opacity .8s ease; padding: 24px; }
  #enter.gone { opacity: 0; pointer-events: none; }
  #enter .card { max-width: 420px; }
  #enter .etitle { color: #fff; font-size: 30px; font-weight: 300; letter-spacing: .06em; margin-bottom: 14px; }
  #enter .esub { color: #aeb6c8; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
  #enter button { display: inline-block; margin: 6px; padding: 13px 26px; font-size: 15px; border-radius: 30px;
                  cursor: pointer; border: 1px solid rgba(255,255,255,0.18);
                  background: linear-gradient(180deg, #2a3350, #1b2238); color: #fff; }
  #enter button.ghost { background: transparent; color: #8b93a6; }
  #enter button:hover { border-color: rgba(255,255,255,0.4); }
  #enter .enote { color: #c98; font-size: 12.5px; margin-top: 18px; min-height: 16px; }
  @media (max-width: 760px) { #panelToggle { display: block; } }
  /* phones: keep the panel thumb-reachable; one row that scrolls; hide the desktop hint */
  @media (max-width: 760px) {
    #ui { font-size: 11px; gap: 12px; padding: 7px 12px; bottom: max(8px, env(safe-area-inset-bottom));
          flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; -webkit-overflow-scrolling: touch; }
    #ui::-webkit-scrollbar { display: none; }
    #ui input[type=range] { width: 56px; }
    #tag { display: none; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <span class="grp"><span class="ttl">◇ JALÜ</span><span class="dot" id="dot"></span><span id="status" class="muted"></span></span>
  <span class="grp"><label>Input <select id="inputs"></select></label></span>
  <span class="grp"><label>Color
    <select id="palette">
      <option value="notes">Note colors</option>
      <option value="rainbow">Rainbow</option>
      <option value="vajra">Vajra</option>
      <option value="elements">Elements</option>
      <option value="aurora">Aurora</option>
    </select></label></span>
  <span class="grp"><label>Glow <input id="glow" type="range" min="0" max="100" value="42"></label></span>
  <span class="grp"><label>Persist <input id="persist" type="range" min="4" max="60" value="26"></label></span>
  <span class="grp"><label>Drift <input id="drift" type="range" min="0" max="100" value="30"></label></span>
  <span class="grp"><label>Swirl <input id="swirl" type="range" min="0" max="100" value="45"></label></span>
  <span class="grp"><label>Strings <input id="strings" type="range" min="0" max="100" value="30"></label></span>
  <span class="grp"><label>Syllables <input id="syl" type="range" min="0" max="100" value="14"></label></span>
  <span class="grp"><button id="rec">● Rec</button></span>
  <span class="grp"><button id="clear">Clear</button></span>
</div>
<div id="tag">drag to orbit · scroll to zoom · <b>H</b> pin menu · <b>F</b> fullscreen · <b>C</b> clear · hold 3+ keys → rainbow</div>
<div id="recdot" class="hidden">● REC</div>
<button id="panelToggle" aria-label="show controls">◇</button>

<!-- One-tap entry: unlocks audio + asks for the mic so a phone with no keyboard can play by voice -->
<div id="enter">
  <div class="card">
    <div class="etitle">Caroline Rainbow</div>
    <div class="esub">Sing, hum, or chant — and the light will answer.<br>Your voice paints the rainbow body.</div>
    <button id="beginVoice">Begin with your voice</button>
    <button id="beginWatch" class="ghost">Just watch</button>
    <div class="enote" id="enterNote"></div>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js", "three/addons/": "./vendor/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// preload the Tibetan font so seed-syllable canvas textures render correctly
if (document.fonts && document.fonts.load) document.fonts.load('40px "Noto Serif Tibetan"');

// ======================================================================
// LAYERING — the law of this piece
//   The NOTES are the music; they must always render on top.
//   BACKGROUND (farthest) -> CENTER FIGURE (middle) -> NOTES (nearest, always visible).
//   renderOrder forces draw order within the transparent pass; the figure and
//   background write no depth, so they can never occlude a note.
// ======================================================================
const ORDER = { BG: -20, AURA: -14, FIGURE: -8, RAINBOW: 6, SPHERE: 8, NOTE: 12, STRING: 13, SEED: 14 };

// ======================================================================
// CORRESPONDENCE ENGINE
// ======================================================================
const NATURALS = { 0:0xffffff, 2:0x2f6bff, 4:0xff3b30, 5:0x3ad16a, 7:0xffe14d, 9:0xd4af37, 11:0x8b5a2b };
const NOTE_COLORS = (() => {
  const arr = new Array(12);
  for (const k in NATURALS) arr[+k] = new THREE.Color(NATURALS[k]);
  const lo = [0,2,4,5,7,9,11];
  for (let pc = 0; pc < 12; pc++) {
    if (arr[pc]) continue;
    const below = lo.filter(n => n < pc).pop(), above = lo.find(n => n > pc);
    arr[pc] = arr[below].clone().lerp(arr[above], 0.5);
  }
  return arr;
})();
const SEEDS = [
  { name:'OM', glyph:'ༀ', color:0xff3b30 },
  { name:'AH', glyph:'ཨཱཿ', color:0xffffff },
  { name:'HUNG', glyph:'ཧཱུྃ', color:0x2f6bff },
];

// ---- Quantized jewel colors -------------------------------------------------
// Continuous hue ramps smeared adjacent notes into a wash. Instead every palette
// (except "notes", which is already 12 discrete pitch-class colors) snaps to a set
// of five widely-separated anchor colors — the five-light / five-element families.
// note % 5 guarantees neighbouring semitones land on different anchors, so notes
// read as separate jewels rather than a gradient.
const ANCHORS = {
  rainbow:  [0xff2d2d, 0xff8a00, 0xffe14d, 0x37d35a, 0x2f6bff],   // red · orange · gold · green · blue
  aurora:   [0x18e0a0, 0x49d36a, 0x7ef0c0, 0x46b6ff, 0x9a6bff],   // teal · green · mint · sky · violet
  vajra:    [0xffffff, 0xffd23d, 0xff3b30, 0x37d35a, 0x2f6bff],   // five buddha families
  elements: [0xf2c14e, 0xeaf4ff, 0xff4d3d, 0x4bd47a, 0x7fb2ff],   // earth · space · fire · wind · water
};
function colorForNote(note) {
  if (params.palette === 'notes') return NOTE_COLORS[((note % 12) + 12) % 12].clone();
  const set = ANCHORS[params.palette] || ANCHORS.rainbow;
  return new THREE.Color(set[((note % 5) + 5) % 5]);
}

const GEOMS = [
  () => new THREE.IcosahedronGeometry(1,0), () => new THREE.OctahedronGeometry(1,0),
  () => new THREE.TetrahedronGeometry(1,0), () => new THREE.BoxGeometry(1.4,1.4,1.4),
  () => new THREE.DodecahedronGeometry(1,0), () => new THREE.TorusGeometry(0.9,0.32,8,20),
  () => new THREE.ConeGeometry(1,1.8,6), () => new THREE.IcosahedronGeometry(1,1),
  () => new THREE.OctahedronGeometry(1.1,0), () => new THREE.TorusKnotGeometry(0.7,0.22,64,8),
  () => new THREE.BoxGeometry(1,2.2,1), () => new THREE.DodecahedronGeometry(1.1,0),
];
const CENTER = new THREE.Vector3(0, 2, 0);
function noteToTarget(note, vel) {
  const pc = note%12, oct = Math.floor(note/12);
  const az = (pc/12)*Math.PI*2 + (Math.random()-0.5)*0.35;
  const el = ((oct-5)/3.2)*(Math.PI*0.46) + (Math.random()-0.5)*0.30;
  const r = 15 + vel*7 + Math.random()*3;
  return new THREE.Vector3(Math.cos(az)*Math.cos(el)*r, Math.sin(el)*r, Math.sin(az)*Math.cos(el)*r).add(CENTER);
}

// ======================================================================
// SCENE
// ======================================================================
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x04050a, 0.008);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 6, 52);
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.target.copy(CENTER); controls.autoRotate = true; controls.autoRotateSpeed = 0.3;
controls.enablePan = false;                 // one finger orbits, pinch zooms — no accidental pan on touch
controls.minDistance = 12; controls.maxDistance = 140;

scene.add(new THREE.AmbientLight(0x404060, 1.1));
const keyLight = new THREE.PointLight(0xffffff, 70, 400); keyLight.position.set(20,30,20); scene.add(keyLight);
const coreLight = new THREE.PointLight(0xffeede, 0, 140); coreLight.position.copy(CENTER); scene.add(coreLight);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.5, 0.55, 0.30); // strength, radius, threshold
composer.addPass(bloom);

const grid = new THREE.GridHelper(180, 54, 0x121826, 0x090d15);
grid.material.transparent = true; grid.material.opacity = 0.25; grid.position.y = -16; grid.renderOrder = ORDER.BG; scene.add(grid);

function texFromDraw(draw, S = 512) {
  const cv = document.createElement('canvas'); cv.width = cv.height = S;
  draw(cv.getContext('2d'), S);
  const tx = new THREE.CanvasTexture(cv); tx.colorSpace = THREE.SRGBColorSpace; return tx;
}

// ======================================================================
// BACKGROUND — its own breathing layer (medium pace: slower than notes,
// faster than the figure). A pastel rainbow nautilus that slowly swirls and,
// over many seconds, dissolves toward near-white and back — rainbow light
// resolving into clear light. A white "breath" sprite handles the wash so the
// rainbow texture itself stays saturated. Lives behind everything; additive,
// so it can lift the field but never occlude a note.
// ======================================================================
const spiral = new THREE.Sprite(new THREE.SpriteMaterial({
  map: texFromDraw((ctx, S) => {
    const c = S/2;
    for (let r = c; r > 2; r -= 2) {
      for (let a = 0; a < 360; a += 2) {
        const ang = a*Math.PI/180;
        const hue = (((a/360) + (r/c)*1.4) % 1 + 1) % 1;     // hue shifts with radius -> spiral arms
        ctx.fillStyle = `hsla(${hue*360},62%,76%,0.5)`;
        ctx.fillRect(c + Math.cos(ang)*r - 1.5, c + Math.sin(ang)*r - 1.5, 3, 3);
      }
    }
    const g = ctx.createRadialGradient(c, c, 0, c, c, c);    // fade center (figure) + edges
    g.addColorStop(0, 'rgba(4,5,10,0.85)'); g.addColorStop(0.18, 'rgba(4,5,10,0.0)');
    g.addColorStop(0.7, 'rgba(4,5,10,0.0)'); g.addColorStop(1, 'rgba(4,5,10,1)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, S, S);
  }, 768),
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.5,
}));
spiral.scale.setScalar(150); spiral.position.copy(CENTER); spiral.position.z = -28; spiral.renderOrder = ORDER.BG; scene.add(spiral);

// soft white RING that breathes up to wash the rainbow arms toward clear light.
// Stays clear in the central ~25% so it never piles light on the figure or
// flattens note contrast — the wash lives out where the nautilus arms are.
const whiteBreath = new THREE.Sprite(new THREE.SpriteMaterial({
  map: texFromDraw((ctx, S) => {
    const c = S/2, g = ctx.createRadialGradient(c, c, 0, c, c, c);
    g.addColorStop(0, 'rgba(235,242,255,0)'); g.addColorStop(0.25, 'rgba(235,242,255,0)');
    g.addColorStop(0.55, 'rgba(240,245,255,0.85)'); g.addColorStop(1, 'rgba(235,242,255,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, S, S);
  }),
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.0,
}));
whiteBreath.scale.setScalar(150); whiteBreath.position.copy(spiral.position); whiteBreath.renderOrder = ORDER.BG + 1; scene.add(whiteBreath);

// ---- Aura behind the figure ----
const aura = new THREE.Sprite(new THREE.SpriteMaterial({
  map: texFromDraw((ctx, S) => {
    const c = S/2, g = ctx.createRadialGradient(c, c, 0, c, c, c);
    g.addColorStop(0, 'rgba(255,248,232,0.75)'); g.addColorStop(0.4, 'rgba(255,236,200,0.32)'); g.addColorStop(1, 'rgba(255,236,200,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, S, S);
  }),
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, opacity: 0.28,
}));
aura.scale.setScalar(6.5); aura.position.copy(CENTER); aura.renderOrder = ORDER.AURA; scene.add(aura);

// ======================================================================
// CENTER FIGURE — Caroline, four poses. "May all beings be happy," in her honor.
//   Four transparent silhouettes (same body, same teal, each with baked glow).
//   They are baseline-aligned on the feet and share one units-per-pixel scale, so
//   a taller pose simply rises higher — it reads as one body changing, not images
//   swapping. Poses crossfade slowly in weighted-random order, biased toward the
//   seated "home" pose. The figure is the SLOWEST-moving element in the piece:
//   a constant faint breath and sway under a very slow pose cycle.
// ======================================================================
// Transparent-background silhouettes, baseline-aligned on the feet and sharing
// one units-per-pixel scale, so a taller pose simply rises higher and it reads as
// one body changing, not images swapping.
const POSES = [
  { file: 'caroline_01_seated_meditation.png', w: 500, h: 602, weight: 0.46 },  // home / still point
  { file: 'caroline_02_standing_arms_raised.png', w: 437, h: 768, weight: 0.18 },
  { file: 'caroline_03_forward_fold.png', w: 490, h: 670, weight: 0.18 },
  { file: 'caroline_04_seated_grounded.png', w: 504, h: 711, weight: 0.18 },
];
const FIG_K = 0.0266;          // world units per source pixel (seated ≈ 16u tall)
const FOOT_Y = -5.5;           // shared baseline so feet never jump between poses
const FIG_WHITE = '#eef3fb';   // soft, washed-out white the figure is recolored to
// The source art is teal; a sprite tint can only multiply, so recolor at load:
// keep each silhouette's alpha (the figure shape + soft edge) but swap the color
// to white via a source-in composite. Returns a CanvasTexture.
function whiteSilhouetteTexture(src) {
  const tex = new THREE.Texture(); tex.colorSpace = THREE.SRGBColorSpace;
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas'); cv.width = img.width; cv.height = img.height;
    const ctx = cv.getContext('2d');
    ctx.drawImage(img, 0, 0);
    ctx.globalCompositeOperation = 'source-in';      // recolor opaque pixels, preserve alpha
    ctx.fillStyle = FIG_WHITE; ctx.fillRect(0, 0, cv.width, cv.height);
    tex.image = cv; tex.needsUpdate = true;
  };
  img.src = src;
  return tex;
}
const FIG = { sprites: [], base: [], cur: 0, next: -1, fade: 1, fadeDur: 4, hold: 7, timer: 0 };
for (let i = 0; i < POSES.length; i++) {
  const p = POSES[i];
  const tex = whiteSilhouetteTexture('./assets/' + p.file);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, opacity: i === 0 ? 1 : 0 }));
  sp.center.set(0.5, 0);                                  // anchor at the feet
  const bw = p.w * FIG_K, bh = p.h * FIG_K;
  sp.scale.set(bw, bh, 1); sp.position.set(0, FOOT_Y, 0); sp.renderOrder = ORDER.FIGURE;
  scene.add(sp); FIG.sprites.push(sp); FIG.base.push({ x: bw, y: bh });
}
function figPickNext() {
  // weighted random, never repeat current, bias toward the seated home pose
  const w = POSES.map((p, i) => i === FIG.cur ? 0 : p.weight);
  let sum = w.reduce((a, b) => a + b, 0), r = Math.random() * sum;
  for (let i = 0; i < w.length; i++) { r -= w[i]; if (r <= 0) return i; }
  return (FIG.cur + 1) % POSES.length;
}
function updateFigure(dt, t) {
  FIG.timer += dt;
  if (FIG.next < 0) {                                     // holding a pose
    if (FIG.timer > FIG.hold) { FIG.next = figPickNext(); FIG.fade = 0; FIG.fadeDur = 3.5 + Math.random() * 2.5; }
  } else {                                                // crossfading into the next pose
    FIG.fade += dt / FIG.fadeDur;
    if (FIG.fade >= 1) { FIG.cur = FIG.next; FIG.next = -1; FIG.timer = 0; FIG.hold = 6 + Math.random() * 6; }
  }
  const breath = 1 + Math.sin(t * 0.5) * 0.012;          // subtle constant breathing
  const swayX = Math.sin(t * 0.23) * 0.18;               // faint sway
  const swayR = Math.sin(t * 0.19) * 0.012;
  const lift = 0.92 + corePulse * 0.4;                   // brighten gently when notes arrive
  for (let i = 0; i < FIG.sprites.length; i++) {
    const sp = FIG.sprites[i], b = FIG.base[i];
    let op = 0;
    if (i === FIG.cur) op = FIG.next < 0 ? 1 : 1 - FIG.fade;
    if (i === FIG.next) op = FIG.fade;
    sp.material.opacity = op * lift;
    sp.scale.set(b.x * breath, b.y * breath, 1);
    sp.position.x = swayX; sp.material.rotation = swayR;
  }
}
let corePulse = 0;

// ======================================================================
// PARAMS
// ======================================================================
const params = { palette:'notes', glow:0.42, persist:26, drift:0.30, swirl:0.45, strings:0.30, syl:0.14 };
const bind = (id, key, fn = v => +v) => { const el = document.getElementById(id); el.oninput = () => params[key] = fn(el.value); };
bind('persist','persist'); bind('drift','drift',v=>+v/100); bind('swirl','swirl',v=>+v/100);
bind('strings','strings',v=>+v/100); bind('syl','syl',v=>+v/100); bind('glow','glow',v=>+v/100);
document.getElementById('palette').onchange = e => params.palette = e.target.value;

// ======================================================================
// MARKS  (the notes — the heart of the piece)
// ======================================================================
const marks = [];
const held = new Map();
let lastShape = null, frame = 0, nextRainbowFrame = 0;
let energy = 0;                  // smoothed overall input energy, drives the background pulse
let lastInputClock = 0;          // wall-clock of the last real (non-ambient) note, for idle detection
const clock = new THREE.Clock();
const easeOut = x => 1 - Math.pow(1-x, 3);
const _v = new THREE.Vector3();

function spawnShape(channel, note, velocity, ambient = false) {
  const vel = velocity / 127;                       // 0..1 — how hard the key was pressed
  const oct = Math.floor(note / 12);
  const octT = THREE.MathUtils.clamp((oct - 2) / 6, 0, 1);   // 0 low octave .. 1 high octave
  const to = noteToTarget(note, vel);
  const color = colorForNote(note).multiplyScalar(0.55 + octT * 0.9);   // octave -> brightness (low deeper, high brighter)
  const geo = GEOMS[note % GEOMS.length]();
  const mat = new THREE.MeshStandardMaterial({
    color: 0x000000, emissive: color, emissiveIntensity: 0.35 + vel*1.5,   // light intensity follows touch
    metalness: 0.3, roughness: 0.3, transparent: true, opacity: 1, flatShading: true,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(CENTER); mesh.scale.setScalar(0.001); mesh.renderOrder = ORDER.NOTE;
  const wire = new THREE.LineSegments(new THREE.WireframeGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.2 + vel*0.35 }));
  wire.renderOrder = ORDER.NOTE;
  mesh.add(wire); scene.add(mesh);
  const mk = {
    mesh, mat, wire, color, kind:'shape', dead:false,
    from: CENTER.clone(), to, target: (0.6 + vel*2.2) * (1.5 - octT), born:0, fly:0, sustaining:true,  // octave -> size (low bigger)
    drift: new THREE.Vector3((Math.random()-0.5), (Math.random()-0.5)*0.6+0.12, (Math.random()-0.5)).multiplyScalar(0.4+vel*0.6),
    spin: new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)).multiplyScalar(0.5+vel),
    swirlDir: Math.random() < 0.5 ? 1 : -1,
  };
  marks.push(mk); held.set(channel+':'+note, mk);
  corePulse = Math.min(1.2, corePulse + 0.25 + vel*0.45);
  energy = Math.min(1.5, energy + 0.12 + vel*0.3);
  if (!ambient) lastInputClock = clock.elapsedTime;   // real input silences the ambient drift

  const others = [...held.values()].filter(m => m !== mk && !m.dead);
  if (others.length >= 1 && Math.random() < 0.6 + params.strings*0.4) { for (const o of others.slice(-2)) addString(mk, o); }
  else if (lastShape && !lastShape.dead && Math.random() < params.strings) addString(mk, lastShape);
  lastShape = mk;

  if (Math.random() < params.syl) spawnSeed(to, vel);
  if (held.size >= 3 && frame > nextRainbowFrame) { spawnRainbow(); nextRainbowFrame = frame + 70; }

  const cap = Math.floor(40 + params.persist*8);
  if (marks.length > cap && marks[0]) marks[0].sustaining = false;
  return mk;
}

function glyphTexture(glyph, hex) {
  return texFromDraw((ctx, S) => {
    ctx.font = '170px "Noto Serif Tibetan","Kailasa","Tibetan Machine Uni",serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = hex; ctx.shadowBlur = 24; ctx.fillStyle = hex;
    ctx.fillText(glyph, S/2, S/2 + 8);
  }, 256);
}
function spawnSeed(nearPos, vel) {
  const seed = SEEDS[Math.floor(Math.random()*SEEDS.length)];
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glyphTexture(seed.glyph, '#'+new THREE.Color(seed.color).getHexString()),
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  spr.position.copy(CENTER); spr.scale.setScalar(0.001); spr.renderOrder = ORDER.SEED; scene.add(spr);
  marks.push({
    mesh: spr, mat: spr.material, wire: null, kind:'seed', dead:false,
    from: CENTER.clone(), to: nearPos.clone().multiplyScalar(0.6).add(new THREE.Vector3(0,3,0)),
    target: 5 + vel*2, born:0, fly:0, sustaining:true,
    drift: new THREE.Vector3((Math.random()-0.5)*0.3, 0.5, (Math.random()-0.5)*0.3), swirlDir: 1,
  });
}
function release(channel, note) { const m = held.get(channel+':'+note); if (m) { m.sustaining = false; held.delete(channel+':'+note); } }

function disposeMark(m) {
  m.dead = true; scene.remove(m.mesh);
  if (m.mesh.geometry) m.mesh.geometry.dispose();
  if (m.mat.map) m.mat.map.dispose();
  m.mat.dispose();
  if (m.wire) { m.wire.geometry.dispose(); m.wire.material.dispose(); }
}
function updateMarks(dt) {
  for (let i = marks.length - 1; i >= 0; i--) {
    const m = marks[i]; m.born += dt;
    if (m.fly < 1) {
      m.fly = Math.min(1, m.fly + dt*1.5);
      m.mesh.position.lerpVectors(m.from, m.to, easeOut(m.fly));
      m.mesh.scale.setScalar(THREE.MathUtils.lerp(0.001, m.target, easeOut(m.fly)));
    } else {
      m.mesh.position.addScaledVector(m.drift, dt*params.drift*2.5);
      // swirl: tangential motion around the figure's vertical axis -> spiral
      _v.set(m.mesh.position.x - CENTER.x, 0, m.mesh.position.z - CENTER.z);
      const rad = _v.length() || 1;
      m.mesh.position.x += (-_v.z/rad) * m.swirlDir * dt * params.swirl * 6;
      m.mesh.position.z += ( _v.x/rad) * m.swirlDir * dt * params.swirl * 6;
      if (m.kind === 'shape' && m.sustaining) m.mesh.scale.setScalar(m.target*(1+Math.sin(m.born*3)*0.03));
    }
    if (m.kind === 'shape') { m.mesh.rotation.x += m.spin.x*dt; m.mesh.rotation.y += m.spin.y*dt; m.mesh.rotation.z += m.spin.z*dt; }
    const ttl = m.kind === 'seed' ? params.persist*1.6 : params.persist;
    if (m.kind === 'seed' && m.sustaining && m.born > ttl*0.7) m.sustaining = false;
    if (!m.sustaining && m.born > ttl) {
      const k = THREE.MathUtils.damp(m.mat.opacity, 0, 0.6, dt);
      m.mat.opacity = k; if (m.wire) m.wire.material.opacity = k*0.4;
      m.mesh.scale.multiplyScalar(1 - dt*0.12);
      if (k < 0.02) { disposeMark(m); marks.splice(i, 1); }
    }
  }
  corePulse = Math.max(0, corePulse - dt*1.4);
  aura.scale.setScalar(6.5 + corePulse*3);
  aura.material.opacity = 0.28 + corePulse*0.22;
  coreLight.intensity = corePulse*55;
}

// ======================================================================
// STRINGS
// ======================================================================
const strings = [];
function addString(a, b) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const mat = new THREE.LineBasicMaterial({ color: a.color.clone().lerp(b.color, 0.5), transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
  const line = new THREE.Line(g, mat); line.frustumCulled = false; line.renderOrder = ORDER.STRING; scene.add(line);
  strings.push({ a, b, line, mat, fade: 1 });
}
function updateStrings(dt) {
  for (let i = strings.length - 1; i >= 0; i--) {
    const s = strings[i];
    if (s.a.dead || s.b.dead) s.fade -= dt*1.5;
    const p = s.line.geometry.attributes.position.array, pa = s.a.mesh.position, pb = s.b.mesh.position;
    p[0]=pa.x; p[1]=pa.y; p[2]=pa.z; p[3]=pb.x; p[4]=pb.y; p[5]=pb.z;
    s.line.geometry.attributes.position.needsUpdate = true;
    s.mat.opacity = Math.max(0, s.fade)*0.5;
    if (s.fade <= 0) { scene.remove(s.line); s.line.geometry.dispose(); s.mat.dispose(); strings.splice(i, 1); }
  }
}

// ======================================================================
// RAINBOW (3+ note chord)
// ======================================================================
const rainbows = [];
function spawnRainbow() {
  const R = 24, seg = 160;
  const geo = new THREE.TorusGeometry(R, 0.6, 10, seg, Math.PI);
  const colors = [], pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const a = Math.atan2(pos.getY(i), pos.getX(i));
    const c = new THREE.Color().setHSL((a/Math.PI)*0.82, 0.75, 0.62);
    colors.push(c.r, c.g, c.b);
  }
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  const mat = new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(CENTER.x, CENTER.y - 2, CENTER.z); mesh.scale.setScalar(0.85); mesh.renderOrder = ORDER.RAINBOW;
  scene.add(mesh); rainbows.push({ mesh, mat, born: 0 });
}
function updateRainbows(dt) {
  for (let i = rainbows.length - 1; i >= 0; i--) {
    const r = rainbows[i]; r.born += dt;
    r.mesh.scale.setScalar(THREE.MathUtils.damp(r.mesh.scale.x, 1, 5, dt));
    r.mat.opacity = r.born < 0.8 ? Math.min(0.8, r.born/0.8*0.8) : Math.max(0, 0.8 - (r.born-0.8)*0.16);
    if (r.born > 6) { scene.remove(r.mesh); r.mesh.geometry.dispose(); r.mat.dispose(); rainbows.splice(i, 1); }
  }
}

function clearCanvas() {
  for (const m of marks) disposeMark(m); marks.length = 0; held.clear(); lastShape = null;
  for (const s of strings) { scene.remove(s.line); s.line.geometry.dispose(); s.mat.dispose(); } strings.length = 0;
  for (const r of rainbows) { scene.remove(r.mesh); r.mesh.geometry.dispose(); r.mat.dispose(); } rainbows.length = 0;
}
document.getElementById('clear').onclick = clearCanvas;

// ======================================================================
// MIDI
// ======================================================================
const dot = document.getElementById('dot'), statusEl = document.getElementById('status'), inputsSel = document.getElementById('inputs');
let midiAccess = null, midiDeviceCount = 0;
function handleMessage(e) {
  const [status, d1, d2] = e.data, cmd = status & 0xf0, ch = status & 0x0f;
  if (cmd === 0x90 && d2 > 0) spawnShape(ch, d1, d2);
  else if (cmd === 0x80 || (cmd === 0x90 && d2 === 0)) release(ch, d1);
}
function bindInputs() {
  for (const input of midiAccess.inputs.values()) input.onmidimessage = null;
  const sel = inputsSel.value;
  for (const input of midiAccess.inputs.values()) if (sel === 'all' || input.id === sel) input.onmidimessage = handleMessage;
}
function refreshList() {
  const prev = inputsSel.value; inputsSel.innerHTML = '';
  const all = document.createElement('option'); all.value = 'all'; all.textContent = 'All inputs'; inputsSel.appendChild(all);
  const names = [];
  for (const input of midiAccess.inputs.values()) { const o = document.createElement('option'); o.value = input.id; o.textContent = input.name; inputsSel.appendChild(o); names.push(input.name); }
  inputsSel.value = [...inputsSel.options].some(o => o.value === prev) ? prev : 'all';
  midiDeviceCount = names.length;
  if (names.length) { dot.classList.add('live'); statusEl.textContent = names.join(', '); } else { dot.classList.remove('live'); statusEl.textContent = 'no device'; }
  bindInputs();
}
inputsSel.addEventListener('change', bindInputs);
if (navigator.requestMIDIAccess) {
  navigator.requestMIDIAccess({ sysex: false }).then(a => { midiAccess = a; refreshList(); a.onstatechange = refreshList; })
    .catch(err => statusEl.textContent = 'MIDI blocked: ' + err.message);
} else statusEl.textContent = 'use Chrome';

// ======================================================================
// KEYBOARD + MENU SHOW/HIDE
// ======================================================================
const ui = document.getElementById('ui'), tag = document.getElementById('tag');
let pinned = false, hideTimer;
function scheduleHide() { clearTimeout(hideTimer); if (pinned) return; hideTimer = setTimeout(() => { ui.classList.add('hidden'); tag.classList.add('hidden'); }, 4000); }
function showUI() { ui.classList.remove('hidden'); tag.classList.remove('hidden'); scheduleHide(); }
addEventListener('pointermove', showUI); addEventListener('pointerdown', showUI); showUI();

const keyMap = { a:60, w:61, s:62, e:63, d:64, f:65, t:66, g:67, y:68, h:69, u:70, j:71, k:72, o:73, l:74 };
const heldKeys = new Set();
addEventListener('keydown', e => {
  const c = e.key.toLowerCase();
  if (c === 'h' && !e.repeat) { pinned = !pinned; if (pinned) { ui.classList.remove('hidden'); tag.classList.remove('hidden'); clearTimeout(hideTimer); } else scheduleHide(); return; }
  if (c === 'c' && !e.repeat) { clearCanvas(); return; }
  if (c === 'f' && !e.repeat) { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); return; }
  if (keyMap[c] && !heldKeys.has(c)) { heldKeys.add(c); spawnShape(0, keyMap[c], 100); }
});
addEventListener('keyup', e => { const c = e.key.toLowerCase(); if (keyMap[c]) { heldKeys.delete(c); release(0, keyMap[c]); } });

// ======================================================================
// AMBIENT — never a dead screen. With no real input for a few seconds, the
// field gently plays itself: sparse pentatonic notes at low velocity, quieting
// the instant a real note (MIDI / key / voice) arrives.
// ======================================================================
const PENTA = [0, 2, 4, 7, 9];                 // C D E G A relative
let nextAmbient = 4;
function maybeAmbient(t) {
  if (t - lastInputClock < 6) return;          // real input recently — stay quiet
  if (t < nextAmbient) return;
  const pc = PENTA[Math.floor(Math.random() * PENTA.length)];
  const oct = 4 + Math.floor(Math.random() * 3);             // octaves 4..6
  spawnShape(0, oct * 12 + pc, 38 + Math.floor(Math.random() * 26), true);
  nextAmbient = t + 2.6 + Math.random() * 4;                 // sparse, irregular
}

// ======================================================================
// VOICE / CHANT INPUT (Web Audio)
//   A phone with no keyboard and no DAW can play by voice. We detect the
//   fundamental pitch by autocorrelation, median-smooth it, and route it into the
//   SAME note vocabulary as MIDI — reusing spawnShape, never forking the renderer.
//   Fundamental -> color + position (quantized); loudness -> brightness + size.
//   A sustained tone grows a slow sphere of light from the figure that dissolves
//   gently when the voice stops. MIDI and voice coexist.
// ======================================================================
const VOICE_GATE = 0.012;        // RMS below this is treated as silence
let audioCtx = null, analyser = null, micStream = null, voiceBuf = null;
let voiceNote = -1, lastVoiceSpawn = 0;
const pitchHist = [];
const voiceColor = new THREE.Color(0xffffff);

// soft sphere of light that swells while a tone is held, decays when it stops
const voiceSphere = new THREE.Mesh(
  new THREE.IcosahedronGeometry(1, 4),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false })
);
voiceSphere.position.copy(CENTER); voiceSphere.renderOrder = ORDER.SPHERE; voiceSphere.scale.setScalar(2); scene.add(voiceSphere);
let voiceSustain = 0;

async function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
  });
  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
  voiceBuf = new Float32Array(analyser.fftSize);
  src.connect(analyser);   // analyser only — never routed to output, so no feedback
  dot.classList.add('live'); statusEl.textContent = midiDeviceCount ? statusEl.textContent + ' + voice' : 'voice';
}
function median(a) { const s = [...a].sort((x, y) => x - y); return s[s.length >> 1]; }
function detectPitch(buf, sr) {
  const n = buf.length; let rms = 0;
  for (let i = 0; i < n; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / n);
  if (rms < VOICE_GATE) return { hz: -1, rms };
  const minLag = Math.floor(sr / 1000), maxLag = Math.floor(sr / 70);   // 70–1000 Hz
  let bestLag = -1, best = 0;
  for (let lag = minLag; lag <= maxLag; lag++) {
    let c = 0; for (let i = 0; i < n - lag; i++) c += buf[i] * buf[i + lag];
    c /= (n - lag);                                  // normalize out the term-count bias
    if (c > best) { best = c; bestLag = lag; }
  }
  return bestLag > 0 ? { hz: sr / bestLag, rms } : { hz: -1, rms };
}
function updateVoice(dt, t) {
  let voiced = false, rms = 0;
  if (analyser) {
    analyser.getFloatTimeDomainData(voiceBuf);
    const p = detectPitch(voiceBuf, audioCtx.sampleRate); rms = p.rms;
    if (p.hz > 0) {
      pitchHist.push(p.hz); if (pitchHist.length > 5) pitchHist.shift();
      const hz = median(pitchHist);
      const note = Math.round(69 + 12 * Math.log2(hz / 440));
      if (note >= 24 && note <= 96) {
        voiced = true;
        voiceColor.copy(colorForNote(note));
        const vel = THREE.MathUtils.clamp(Math.round(rms * 900), 35, 120);
        const changed = note !== voiceNote;
        // new pitch spawns quickly; a held tone spawns a gentle jewel now and then
        if ((changed && t - lastVoiceSpawn > 0.13) || (!changed && t - lastVoiceSpawn > 0.7)) {
          spawnShape(0, note, vel); lastVoiceSpawn = t;
        }
        voiceNote = note; lastInputClock = t;   // voice is real input — silences ambient
      }
    }
  }
  if (!voiced) { voiceNote = -1; pitchHist.length = 0; }
  // sphere: gentle attack, long graceful decay
  voiceSustain = voiced ? Math.min(1, voiceSustain + dt * 0.5) : Math.max(0, voiceSustain - dt * 0.4);
  const target = 2 + voiceSustain * 14 + (voiced ? rms * 8 : 0);
  voiceSphere.scale.setScalar(THREE.MathUtils.damp(voiceSphere.scale.x, target, 3, dt));
  voiceSphere.material.opacity = THREE.MathUtils.damp(voiceSphere.material.opacity, voiceSustain * 0.3, 3, dt);
  voiceSphere.material.color.lerp(voiceColor, dt * 2);
}

// ======================================================================
// ENTRY OVERLAY — one tap unlocks AudioContext + requests the mic
// ======================================================================
const enter = document.getElementById('enter'), enterNote = document.getElementById('enterNote');
async function begin(withVoice) {
  if (withVoice) {
    try { await startAudio(); }
    catch (e) { enterNote.textContent = 'Mic unavailable — you can still play by keyboard or MIDI.'; }
  }
  enter.classList.add('gone'); setTimeout(() => { enter.style.display = 'none'; }, 900);
}
document.getElementById('beginVoice').onclick = () => begin(true);
document.getElementById('beginWatch').onclick = () => begin(false);

// ======================================================================
// RECORDING — canvas + voice into a downloadable clip
// ======================================================================
const recBtn = document.getElementById('rec'), recDot = document.getElementById('recdot');
let mediaRec = null, recChunks = [];
function pickMime() {
  const opts = ['video/mp4;codecs=avc1', 'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'];
  return opts.find(m => window.MediaRecorder && MediaRecorder.isTypeSupported(m)) || '';
}
function toggleRec() {
  if (mediaRec && mediaRec.state !== 'inactive') { mediaRec.stop(); return; }
  if (!window.MediaRecorder || !canvas.captureStream) { recBtn.textContent = 'no rec'; return; }
  const stream = canvas.captureStream(30);
  if (micStream) micStream.getAudioTracks().forEach(tr => stream.addTrack(tr));   // capture the chant too
  const mime = pickMime(); recChunks = [];
  mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
  mediaRec.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
  mediaRec.onstop = () => {
    const type = mediaRec.mimeType || 'video/webm';
    const blob = new Blob(recChunks, { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'caroline-rainbow.' + (type.includes('mp4') ? 'mp4' : 'webm'); a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    recBtn.classList.remove('on'); recBtn.textContent = '● Rec'; recDot.classList.add('hidden');
  };
  mediaRec.start(); recBtn.classList.add('on'); recBtn.textContent = '■ Stop'; recDot.classList.remove('hidden');
}
recBtn.onclick = toggleRec;

// mobile: a tap on the handle pins the panel back into view
document.getElementById('panelToggle').onclick = () => {
  pinned = true; ui.classList.remove('hidden'); tag.classList.remove('hidden'); clearTimeout(hideTimer);
};

// ======================================================================
// LOOP
// ======================================================================
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});
function loop() {
  frame++;
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  updateVoice(dt, t);
  maybeAmbient(t);
  updateMarks(dt); updateFigure(dt, t); updateStrings(dt); updateRainbows(dt);

  // background breath: slow swirl + a many-second wash toward clear light
  const wash = Math.sin(t * 0.09) * 0.5 + 0.5;              // 0..1, period ≈ 70s
  whiteBreath.material.opacity = 0.06 + wash * 0.34;
  spiral.material.opacity = 0.5 - wash * 0.18;
  spiral.material.rotation += dt * 0.03 * (1 + energy * 0.6);
  const bgScale = 150 * (1 + energy * 0.05 + Math.sin(t * 0.4) * 0.008);
  spiral.scale.setScalar(bgScale); whiteBreath.scale.setScalar(bgScale);
  energy = Math.max(0, energy - dt * 0.4);

  bloom.strength = params.glow;                              // live glow control
  controls.update(); composer.render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
